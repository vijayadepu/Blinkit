name: ci-build-asp.net-project
on:
    workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v3
            - name: setup dotnet
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '10.x'
            - name: restore deps
              run: dotnet restore ./BlinkitGHA/BlinkitGHA.slnx
            - name: build app
              run: dotnet build ./BlinkitGHA/BlinkitGHA.slnx --configuration Release --no-restore
              